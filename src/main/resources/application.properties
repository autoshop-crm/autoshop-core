spring.application.name=autoshop-core

# Shared configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/${POSTGRES_DB:postgres}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:autoshop-admin}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:pass}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:${REDIS_PORT:6379}}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:${KAFKA_PUBLIC_PORT:9092}}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.kafka.order-events-topic=${APP_KAFKA_ORDER_EVENTS_TOPIC:autoshop.order-events}
app.events.source=${APP_EVENTS_SOURCE:autoshop-core}
app.events.version=${APP_EVENTS_VERSION:1}
app.events.order-notifications-enabled=${APP_EVENTS_ORDER_NOTIFICATIONS_ENABLED:true}

app.minio.url=${APP_MINIO_URL:http://localhost:${MINIO_API_PORT:9000}}
app.minio.access-key=${APP_MINIO_ACCESS_KEY:${MINIO_ROOT_USER:minioadmin}}
app.minio.secret-key=${APP_MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD:minioadmin}}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:${MAILHOG_SMTP_PORT:1025}}

management.endpoints.web.exposure.include=health

app.auth.base-url=${APP_AUTH_BASE_URL:http://localhost:8082}
app.auth.validate-path=${APP_AUTH_VALIDATE_PATH:/api/auth/validate}
app.auth.connect-timeout=${APP_AUTH_CONNECT_TIMEOUT:1s}
app.auth.read-timeout=${APP_AUTH_READ_TIMEOUT:2s}
app.auth.enabled=${APP_AUTH_ENABLED:true}

app.umapi.base-url=${APP_UMAPI_BASE_URL:https://api.umapi.ru}
app.umapi.api-key=${APP_UMAPI_API_KEY:}
app.umapi.language-code=${APP_UMAPI_LANGUAGE_CODE:ru}
app.umapi.region-code=${APP_UMAPI_REGION_CODE:WWW}
app.umapi.connect-timeout=${APP_UMAPI_CONNECT_TIMEOUT:2s}
app.umapi.read-timeout=${APP_UMAPI_READ_TIMEOUT:5s}
app.umapi.cache.search-ttl=${APP_UMAPI_CACHE_SEARCH_TTL:6h}
app.umapi.retry.max-attempts=${APP_UMAPI_RETRY_MAX_ATTEMPTS:3}
app.umapi.retry.backoff=${APP_UMAPI_RETRY_BACKOFF:500ms}

app.carreta.base-url=${APP_CARRETA_BASE_URL:https://api.carreta.ru}
app.carreta.api-key=${APP_CARRETA_API_KEY:}
app.carreta.account=${APP_CARRETA_ACCOUNT:}
app.carreta.test-orders-enabled=${APP_CARRETA_TEST_ORDERS_ENABLED:true}
app.carreta.connect-timeout=${APP_CARRETA_CONNECT_TIMEOUT:2s}
app.carreta.read-timeout=${APP_CARRETA_READ_TIMEOUT:5s}
app.carreta.cache.search-ttl=${APP_CARRETA_CACHE_SEARCH_TTL:30m}
app.carreta.retry.max-attempts=${APP_CARRETA_RETRY_MAX_ATTEMPTS:3}
app.carreta.retry.backoff=${APP_CARRETA_RETRY_BACKOFF:500ms}

app.employee-sync.token=${APP_EMPLOYEE_SYNC_TOKEN:change-me-employee-sync-token}
